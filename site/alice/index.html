<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alice In Borderland — Théo Legrain</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
  }

  /* ── NAV FIXE GAUCHE ── */
  nav {
    position: fixed;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  nav a {
    color: #fff;
    text-decoration: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    white-space: nowrap;
  }
  nav a:hover { color: #e50914; }

  /* ── SECTION 1 : HERO ── */
  #hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #000;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: stretch;
  }
  /* Personnage gauche (Vérifié : HTTPS OK) */
  .hero-char-left {
    width: 22%;
    background: url(https://i-p.rmcdn.net/68f8e6a30ed79b64ce4ba1c4/5893419/image-57144c8d-fd8d-440e-80c2-a198611d6734.jpg) left center / cover no-repeat;
    mask-image: linear-gradient(to right, rgba(0,0,0,1) 40%, rgba(0,0,0,0));
    -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 40%, rgba(0,0,0,0));
  }
  /* Personnage droite (Vérifié : HTTPS OK) */
  .hero-char-right {
    width: 22%;
    margin-left: auto;
    background: url(https://i-p.rmcdn.net/68f8e6a30ed79b64ce4ba1c4/5893419/image-57144c8d-fd8d-440e-80c2-a198611d6734.jpg) right center / cover no-repeat;
    mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0));
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0));
    transform: scaleX(-1);
  }

  /* Carte au centre du hero */
  .hero-card {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    opacity: 0.6;
  }

  .hero-title {
    position: relative;
    z-index: 2;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    line-height: 1.4;
    animation: fadeInUp 1s ease 0.3s both;
  }
  .hero-title .line1 {
    font-size: clamp(28px, 5.5vw, 72px);
    display: block;
    letter-spacing: 0.04em;
  }
  .hero-title .line2 {
    font-size: clamp(22px, 4.2vw, 56px);
    display: block;
    letter-spacing: 0.04em;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION 2 : TEXTE ── */
  #description {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 80px 80px 160px;
    background: #000;
  }
  .desc-text {
    max-width: 560px;
    font-size: 16px;
    line-height: 2;
    color: #fff;
    text-align: center;
  }
  .desc-text strong {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #e50914;
    display: block;
    margin-bottom: 30px;
    letter-spacing: 0.08em;
  }

  /* ── SECTION 3 : GRILLE 6 AFFICHES ── */
  #affiches {
    padding: 60px 80px 100px 160px;
    background: #000;
  }
  .affiches-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }
  .affiche-item {
    aspect-ratio: 2/3;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .affiche-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease, filter 0.3s;
  }
  .affiche-item:hover img {
    transform: scale(1.05);
    filter: brightness(1.1);
  }
  .affiche-item::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(229,9,20,0);
    transition: border-color 0.3s;
    pointer-events: none;
  }
  .affiche-item:hover::after {
    border-color: rgba(229,9,20,0.6);
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  #lightbox.open { display: flex; }

    max-height: 90vh;
    max-width: 90vw;
